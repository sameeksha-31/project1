<div class="login-container">

  <div class="login-card">

    <h2>Login / Signup</h2>

    <input
      type="email"
      placeholder="Email">

    <input
      type="password"
      placeholder="Password">

    <button (click)="login()">
      Login
    </button>

    <button>
      Signup
    </button>

  </div>

</div>
