<nav class="navbar">

  <div class="dashboard-menu">

    <span (click)="toggleDashboard()">
      Dashboard ▼
    </span>

    @if(showDashboard){

      <div class="dropdown">

        <div class="dropdown-item"
             (click)="toggleDevOps()">
          DevOps ▼
        </div>

        @if(showDevOps){

          <div class="sub-dropdown">

            <div class="dropdown-item"
                 (click)="toggleProjects()">
              Projects ▼
            </div>

            @if(showProjects){

              <div class="sub-dropdown">

                <div class="dropdown-item">
                  Repos
                </div>

                <div class="dropdown-item">
                  Pipelines
                </div>

              </div>

            }

          </div>

        }

        <div class="dropdown-item">
          Azure
        </div>

      </div>

    }

  </div>

  <div class="links">

    <a routerLink="/home">Home</a>

    <a routerLink="/about">About</a>

    <div class="account">

      <span (click)="toggleLogout()">
        Account ▼
      </span>

      @if(showLogout){

        <div class="logout-menu">

          <button (click)="logout()">
            Logout
          </button>

        </div>

      }

    </div>

  </div>

</nav>
